<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>{{TITLE}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" crossorigin>
  <style>

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cyan: #00e5ff;
      --magenta: #d946ef;
      --dark: #0a0a0f;
      --dim-cyan: #00e5ff44;
      --glow: 0 0 8px #00e5ff66, 0 0 20px #00e5ff22;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--dark);
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── Love2D canvas ── */
    #loadingCanvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    #canvas {
      display: block;
      width: 100%; height: 100%;
      cursor: default;
      opacity: 0;
    }

    /* ── Boot overlay ── */
    #boot-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: var(--dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.8s ease-out;
    }

    #boot-overlay.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    #boot-overlay.hidden { display: none; }

    /* ── Terminal block ── */
    #terminal {
      width: min(640px, 90vw);
      padding: 2rem;
      position: relative;
    }

    .boot-line {
      color: var(--cyan);
      font-size: 14px;
      line-height: 1.8;
      white-space: pre;
      opacity: 0;
      text-shadow: var(--glow);
    }

    .boot-line.visible { opacity: 1; }

    .boot-line .check {
      color: #22c55e;
      text-shadow: 0 0 6px #22c55e66;
    }

    .boot-line.command {
      color: #888;
      font-size: 12px;
    }

    .boot-line.hero {
      font-size: 18px;
      color: var(--cyan);
      margin-top: 1rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    /* Blinking cursor */
    #cursor {
      display: inline-block;
      width: 8px;
      height: 16px;
      background: var(--cyan);
      vertical-align: middle;
      animation: blink 0.6s step-end infinite;
      box-shadow: var(--glow);
    }

    @keyframes blink { 50% { opacity: 0; } }

    /* ── Scanline overlay ── */
    #scanlines {
      position: fixed;
      inset: 0;
      z-index: 200;
      pointer-events: none;
      opacity: 0;
      background:
        repeating-linear-gradient(
          0deg,
          rgba(0, 0, 0, 0.12) 0px,
          rgba(0, 0, 0, 0.12) 1px,
          transparent 1px,
          transparent 3px
        );
    }

    #scanlines.active {
      animation: scanline-reveal 1s ease-out forwards;
    }

    @keyframes scanline-reveal {
      0%  { opacity: 1; }
      40% { opacity: 0.8; }
      100% { opacity: 0; }
    }

    /* ── Sweep line ── */
    #sweep {
      position: fixed;
      top: -4px;
      left: 0; right: 0;
      height: 4px;
      z-index: 201;
      pointer-events: none;
      background: linear-gradient(180deg, transparent, var(--cyan), rgba(0,229,255,0.4), transparent);
      box-shadow: 0 0 30px 10px rgba(0,229,255,0.3), 0 0 60px 20px rgba(0,229,255,0.1);
      opacity: 0;
    }

    #sweep.active {
      animation: sweep-down 0.8s ease-in-out forwards;
    }

    @keyframes sweep-down {
      0%   { top: -4px; opacity: 1; }
      90%  { opacity: 0.6; }
      100% { top: calc(100vh + 4px); opacity: 0; }
    }

    /* ── CRT vignette ── */
    #terminal::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.4) 100%);
      pointer-events: none;
    }

    /* ── Progress bar ── */
    #progress-bar {
      width: 100%;
      height: 2px;
      background: rgba(0, 229, 255, 0.1);
      margin-top: 1.5rem;
      border-radius: 1px;
      overflow: hidden;
      opacity: 0;
    }

    #progress-bar.visible { opacity: 1; }

    #progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--cyan), var(--magenta));
      box-shadow: 0 0 8px var(--cyan);
      transition: width 0.3s ease-out;
    }
  </style>
</head>
<body>

  <canvas id="loadingCanvas" oncontextmenu="event.preventDefault()"></canvas>
  <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

  <!-- Boot sequence overlay -->
  <div id="boot-overlay">
    <div id="terminal">
      <div class="boot-line command" id="line-cmd"></div>
      <div class="boot-line" id="line-0"></div>
      <div class="boot-line" id="line-1"></div>
      <div class="boot-line" id="line-2"></div>
      <div class="boot-line hero" id="line-hero"></div>
      <div id="progress-bar"><div id="progress-fill"></div></div>
    </div>
  </div>

  <div id="scanlines"></div>
  <div id="sweep"></div>

  <script>
    // Prevent arrow keys and space from scrolling the page
    window.addEventListener('keydown', function (e) {
      if ([32, 37, 38, 39, 40].indexOf(e.keyCode) > -1) e.preventDefault();
    }, false);
    window.onload = function () { window.focus(); };
    window.onclick = function () { window.focus(); };

    // ── Boot sequence ──────────────────────────────────────
    (function() {
      'use strict';

      var GATE_KEY = 'reactjit_boot_seen';
      var GATE_TTL = 24 * 60 * 60 * 1000;
      var MIN_BOOT_MS = 2800;

      var overlay = document.getElementById('boot-overlay');
      var scanlines = document.getElementById('scanlines');
      var sweep = document.getElementById('sweep');
      var progressFill = document.getElementById('progress-fill');
      var progressBar = document.getElementById('progress-bar');

      function hasSeenBoot() {
        try {
          var ts = localStorage.getItem(GATE_KEY);
          if (!ts) return false;
          return (Date.now() - parseInt(ts, 10)) < GATE_TTL;
        } catch(e) { return false; }
      }

      function markBootSeen() {
        try { localStorage.setItem(GATE_KEY, Date.now().toString()); } catch(e) {}
      }

      // Skip boot if seen within 24hr (disabled for testing)
      // var skipBoot = hasSeenBoot();
      var skipBoot = false;
      if (skipBoot) {
        overlay.classList.add('hidden');
      }

      var wasmReady = false;
      var bootAnimDone = skipBoot;
      var bootStartTime = Date.now();

      // Global hook — Module.setStatus calls this
      window.ReactJITBoot = {
        onProgress: function(percent) {
          if (!skipBoot) progressFill.style.width = Math.min(percent, 100) + '%';
        },
        onReady: function() {
          wasmReady = true;
          if (!skipBoot) {
            progressFill.style.width = '100%';
            maybeReveal();
          } else {
            // No boot animation — just show canvas
            document.getElementById('loadingCanvas').style.display = 'none';
            document.getElementById('canvas').style.opacity = '1';
          }
        }
      };

      function typewrite(el, text, speed) {
        return new Promise(function(resolve) {
          el.classList.add('visible');
          var i = 0;
          var cursor = document.createElement('span');
          cursor.id = 'cursor';
          el.appendChild(cursor);

          function tick() {
            if (i < text.length) {
              cursor.before(document.createTextNode(text[i]));
              i++;
              setTimeout(tick, speed + (Math.random() * speed * 0.5));
            } else {
              cursor.remove();
              resolve();
            }
          }
          tick();
        });
      }

      function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

      var LINES = [
        { id: 'line-cmd',  text: '$ reactjit init landing',             delay: 0,    typeSpeed: 35 },
        { id: 'line-0',    text: '  bootstrapping luajit runtime ',      delay: 400,  typeSpeed: 18, check: true },
        { id: 'line-1',    text: '  mounting react reconciler ',         delay: 600,  typeSpeed: 18, check: true },
        { id: 'line-2',    text: '  initializing render pipeline ',      delay: 500,  typeSpeed: 18, check: true },
        { id: 'line-hero', text: 'Happy Hacking.',                      delay: 400,  typeSpeed: 45 },
      ];

      async function runBootSequence() {
        progressBar.classList.add('visible');

        for (var j = 0; j < LINES.length; j++) {
          var line = LINES[j];
          await sleep(line.delay);
          var el = document.getElementById(line.id);
          await typewrite(el, line.text, line.typeSpeed);

          if (line.check) {
            await sleep(200 + Math.random() * 200);
            var span = document.createElement('span');
            span.className = 'check';
            span.textContent = ' \u2713';
            el.appendChild(span);
          }
        }

        var elapsed = Date.now() - bootStartTime;
        var remaining = MIN_BOOT_MS - elapsed;
        if (remaining > 0) await sleep(remaining);

        bootAnimDone = true;
        maybeReveal();
      }

      function maybeReveal() {
        if (!bootAnimDone) return;
        if (!wasmReady) {
          var hero = document.getElementById('line-hero');
          if (!hero.querySelector('#cursor')) {
            var cursor = document.createElement('span');
            cursor.id = 'cursor';
            cursor.style.marginLeft = '4px';
            hero.appendChild(cursor);
          }
          setTimeout(maybeReveal, 100);
          return;
        }
        doReveal();
      }

      function doReveal() {
        markBootSeen();
        var cursor = document.querySelector('#cursor');
        if (cursor) cursor.remove();

        sweep.classList.add('active');
        setTimeout(function() { scanlines.classList.add('active'); }, 100);
        setTimeout(function() { overlay.classList.add('fade-out'); }, 200);

        // Show the Love2D canvas as the overlay fades
        setTimeout(function() {
          document.getElementById('loadingCanvas').style.display = 'none';
          document.getElementById('canvas').style.opacity = '1';
        }, 300);

        setTimeout(function() {
          overlay.classList.add('hidden');
          scanlines.remove();
          sweep.remove();
        }, 1200);
      }

      if (!skipBoot) runBootSequence();
    })();

    // ── HiDPI canvas sizing ──────────────────────────────────
    // love.js initializes the canvas at conf.lua's 800×600, but CSS stretches
    // it to fill the viewport. This syncs the backing store to match, preventing
    // a blurry upscale on HiDPI displays.
    (function() {
      function syncCanvasSize() {
        var w = window.innerWidth;
        var h = window.innerHeight;
        var canvas = document.getElementById('canvas');
        if (canvas && (canvas.width !== w || canvas.height !== h)) {
          canvas.width = w;
          canvas.height = h;
        }
        var loading = document.getElementById('loadingCanvas');
        if (loading && (loading.width !== w || loading.height !== h)) {
          loading.width = w;
          loading.height = h;
        }
      }
      window.addEventListener('resize', syncCanvasSize);
      syncCanvasSize();
      window._syncCanvasSize = syncCanvasSize;
    })();

    // ── Love.js Module config ──────────────────────────────
    var Module = {
      arguments: ['./'],
      INITIAL_MEMORY: 67108864,
      printErr: console.error.bind(console),
      canvas: (function () {
        var canvas = document.getElementById('canvas');
        canvas.addEventListener('webglcontextlost', function (e) {
          alert('WebGL context lost. Reload the page.');
          e.preventDefault();
        }, false);
        return canvas;
      })(),
      setStatus: function (text) {
        if (text) {
          var m = text.match(/\((\d+)\/(\d+)\)/);
          if (m) {
            var pct = Math.round((parseInt(m[1]) / parseInt(m[2])) * 100);
            window.ReactJITBoot.onProgress(pct);
          }
        } else if (Module.remainingDependencies === 0) {
          window.ReactJITBoot.onReady();
        }
      },
      totalDependencies: 0,
      remainingDependencies: 0,
      monitorRunDependencies: function (left) {
        this.remainingDependencies = left;
        this.totalDependencies = Math.max(this.totalDependencies, left);
        Module.setStatus(left
          ? 'Preparing... (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')'
          : '');
      },
      postRun: [function () {
        // Fallback FS exposure — the build-time love.js patch may not fire on
        // all browsers (Safari WASM init order differs from Chrome/Firefox).
        // This guarantees Module.FS is available for bridge.js and WasmApp.
        if (!Module.FS && typeof FS !== 'undefined') {
          Module.FS = FS;
          console.log('[ReactJIT] FS exposed via postRun fallback');
        }
        console.log('[ReactJIT] WASM runtime initialized, FS=' + !!Module.FS);
        // Sync canvas backing store to viewport (overrides conf.lua's 800×600)
        if (window._syncCanvasSize) window._syncCanvasSize();
        // Force love.js/Emscripten to recognize the new canvas dimensions
        window.dispatchEvent(new Event('resize'));
      }],
    };
    Module.setStatus('Downloading...');

    var applicationLoad = function () {
      // Wrap Love() to capture FS from Emscripten's closure scope.
      // The build-time patch injects Module["FS"]=FS inside love.js, but on
      // Safari the WASM init order can race. This wrapper polls until FS appears.
      Love(Module);
      if (!Module.FS) {
        var fsRetry = setInterval(function () {
          // Love() sets Module.FS synchronously via our build patch, OR
          // the postRun hook captures it. If neither worked after 5s, give up.
          if (Module.FS) {
            clearInterval(fsRetry);
            console.log('[ReactJIT] Module.FS detected after Love() init');
          }
        }, 50);
        setTimeout(function () { clearInterval(fsRetry); }, 5000);
      }
    };
  </script>

  <!-- Emscripten data loader (packages .love contents into Module.FS) -->
  <script type="text/javascript" src="game.js"></script>

  <!-- love.js WASM runtime (Emscripten-compiled Love2D) -->
  <script async type="text/javascript" src="love.js" onload="applicationLoad()"></script>

  <!-- Browser-side bridge (Module.FS polling for Lua <-> JS communication) -->
  <script src="bridge.js"></script>

  <!-- React application bundle (IIFE) -->
  <script src="bundle.js"></script>
</body>
</html>
