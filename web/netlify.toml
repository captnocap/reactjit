# Static deploy — no build step. Run `reactjit build web` locally
# and commit dist/web/ or use `netlify deploy --prod --dir=dist/web`.
[build]
  publish = "dist/web"
  command = "echo 'Static site — build locally with: reactjit build web'"

[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Embedder-Policy = "require-corp"
    Cross-Origin-Opener-Policy = "same-origin"
