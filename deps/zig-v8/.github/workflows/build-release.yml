name: build-release

on:
  push:
    tags: ["**"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-x86_64-linux:
    uses: ./.github/workflows/_prebuild-v8.yml
    with:
      runner: ubuntu-22.04
      target: x86_64-linux
      build_type: release

  build-x86_64-linux-debug:
    uses: ./.github/workflows/_prebuild-v8.yml
    with:
      runner: ubuntu-22.04
      target: x86_64-linux
      build_type: debug

  build-arm64-linux:
    uses: ./.github/workflows/_prebuild-v8.yml
    with:
      runner: ubuntu-22.04-arm
      target: aarch64-linux
      build_type: release

  build-aarch64-macos:
    uses: ./.github/workflows/_prebuild-v8.yml
    with:
      runner: macos-26
      target: aarch64-macos
      build_type: release

  build-x86_64-macos:
    uses: ./.github/workflows/_prebuild-v8.yml
    with:
      runner: macos-26-intel
      target: x86_64-macos
      build_type: release

  build-aarch64-ios:
    uses: ./.github/workflows/_prebuild-v8.yml
    with:
      runner: macos-26
      target: aarch64-ios-simulator
      build_type: release
