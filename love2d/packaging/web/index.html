<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>{{TITLE}}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; }
    #loadingCanvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
    }
    #canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: default;
      visibility: hidden;
    }
    #loading {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #888;
      font-family: monospace;
      font-size: 14px;
      text-align: center;
      z-index: 10;
    }
    #loading.hidden { display: none; }
    #loading .bar {
      width: 200px;
      height: 4px;
      background: #222;
      margin: 12px auto 0;
      border-radius: 2px;
      overflow: hidden;
    }
    #loading .bar-fill {
      width: 0%;
      height: 100%;
      background: #5588ff;
      transition: width 0.2s;
    }
  </style>
</head>
<body>
  <canvas id="loadingCanvas" oncontextmenu="event.preventDefault()"></canvas>
  <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

  <div id="loading">
    <div>Loading...</div>
    <div class="bar"><div class="bar-fill" id="progress"></div></div>
  </div>

  <script>
    // Prevent arrow keys and space from scrolling the page
    window.addEventListener('keydown', function (e) {
      if ([32, 37, 38, 39, 40].indexOf(e.keyCode) > -1) e.preventDefault();
    }, false);
    window.onload = function () { window.focus(); };
    window.onclick = function () { window.focus(); };

    // ── HiDPI canvas sizing ──────────────────────────────────
    // love.js initializes the canvas at conf.lua's 800×600, but CSS stretches
    // it to fill the viewport. This syncs the backing store to match, preventing
    // a blurry upscale on HiDPI displays.
    (function() {
      function syncCanvasSize() {
        var w = window.innerWidth;
        var h = window.innerHeight;
        var canvas = document.getElementById('canvas');
        if (canvas && (canvas.width !== w || canvas.height !== h)) {
          canvas.width = w;
          canvas.height = h;
        }
        var loading = document.getElementById('loadingCanvas');
        if (loading && (loading.width !== w || loading.height !== h)) {
          loading.width = w;
          loading.height = h;
        }
      }
      window.addEventListener('resize', syncCanvasSize);
      syncCanvasSize();
      window._syncCanvasSize = syncCanvasSize;
    })();

    // love.js Module configuration — must be defined before game.js + love.js load.
    // love.js exports a factory function `Love(Module)` that initializes the runtime.
    var Module = {
      arguments: ['./'],
      INITIAL_MEMORY: 67108864,
      printErr: console.error.bind(console),
      canvas: (function () {
        var canvas = document.getElementById('canvas');
        canvas.addEventListener('webglcontextlost', function (e) {
          alert('WebGL context lost. Reload the page.');
          e.preventDefault();
        }, false);
        return canvas;
      })(),
      setStatus: function (text) {
        if (text) {
          // Update progress bar
          var m = text.match(/\((\d+)\/(\d+)\)/);
          if (m) {
            var pct = Math.round((parseInt(m[1]) / parseInt(m[2])) * 100);
            var bar = document.getElementById('progress');
            if (bar) bar.style.width = pct + '%';
          }
        } else if (Module.remainingDependencies === 0) {
          // All loaded — hide loading, show game canvas
          document.getElementById('loadingCanvas').style.display = 'none';
          document.getElementById('loading').classList.add('hidden');
          document.getElementById('canvas').style.visibility = 'visible';
        }
      },
      totalDependencies: 0,
      remainingDependencies: 0,
      monitorRunDependencies: function (left) {
        this.remainingDependencies = left;
        this.totalDependencies = Math.max(this.totalDependencies, left);
        Module.setStatus(left
          ? 'Preparing... (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')'
          : 'All downloads complete.');
      },
      postRun: [function () {
        console.log('[ReactJIT] WASM runtime initialized');
        // Sync canvas backing store to viewport (overrides conf.lua's 800×600)
        if (window._syncCanvasSize) window._syncCanvasSize();
        // Force love.js/Emscripten to recognize the new canvas dimensions
        window.dispatchEvent(new Event('resize'));
      }],
    };
    Module.setStatus('Downloading...');

    // Start love.js after it loads
    var applicationLoad = function () {
      Love(Module);
    };
  </script>

  <!-- Emscripten data loader (packages .love contents into Module.FS) -->
  <script type="text/javascript" src="game.js"></script>

  <!-- love.js WASM runtime (Emscripten-compiled Love2D) -->
  <script async type="text/javascript" src="love.js" onload="applicationLoad()"></script>

  <!-- Browser-side bridge (Module.FS polling for Lua <-> JS communication) -->
  <script src="bridge.js"></script>

  <!-- React application bundle (IIFE) -->
  <script src="bundle.js"></script>
</body>
</html>
