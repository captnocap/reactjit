<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Hacker News Clone — React Reference</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Verdana, Geneva, sans-serif; font-size: 13px; background: #f6f6ef; color: #828282; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    // Mock data — 15 stories that look like real HN
    const STORIES = [
      { id: 1, title: "Show HN: I built a React-to-native compiler", url: "https://example.com/reactjit", by: "siah", score: 342, descendants: 127, time: 1711100000 },
      { id: 2, title: "PostgreSQL 17 Released", url: "https://postgresql.org/17", by: "thunderbong", score: 891, descendants: 403, time: 1711096000 },
      { id: 3, title: "The Zig Programming Language (2024)", url: "https://ziglang.org", by: "ingve", score: 567, descendants: 289, time: 1711090000 },
      { id: 4, title: "Why we switched from Rust to Zig for our game engine", url: "https://example.com/zig-engine", by: "bvisness", score: 423, descendants: 312, time: 1711085000 },
      { id: 5, title: "WebGPU is now available in all major browsers", url: "https://web.dev/webgpu", by: "nickcw", score: 678, descendants: 201, time: 1711080000 },
      { id: 6, title: "Ask HN: What are you working on? (March 2026)", url: "", by: "whoishiring", score: 234, descendants: 891, time: 1711075000 },
      { id: 7, title: "A visual guide to flexbox layout", url: "https://example.com/flexbox", by: "mholt", score: 445, descendants: 89, time: 1711070000 },
      { id: 8, title: "SQLite as a document database", url: "https://example.com/sqlite-doc", by: "simonw", score: 312, descendants: 156, time: 1711065000 },
      { id: 9, title: "How SDL3 improves on SDL2", url: "https://example.com/sdl3", by: "icculus", score: 289, descendants: 134, time: 1711060000 },
      { id: 10, title: "The future of native UI frameworks", url: "https://example.com/native-ui", by: "pcwalton", score: 567, descendants: 234, time: 1711055000 },
      { id: 11, title: "Writing a GPU renderer from scratch", url: "https://example.com/gpu-render", by: "gfxfundamentals", score: 445, descendants: 178, time: 1711050000 },
      { id: 12, title: "FreeType 2.14: What's new", url: "https://freetype.org/news", by: "pkhuong", score: 123, descendants: 45, time: 1711045000 },
      { id: 13, title: "Understanding wgpu bind groups", url: "https://example.com/wgpu-bg", by: "kvark", score: 234, descendants: 67, time: 1711040000 },
      { id: 14, title: "QuickJS: A small embeddable JavaScript engine", url: "https://bellard.org/quickjs", by: "bellard", score: 789, descendants: 345, time: 1711035000 },
      { id: 15, title: "Compiling TypeScript to native code without V8", url: "https://example.com/ts-native", by: "evanw", score: 901, descendants: 456, time: 1711030000 },
    ];

    function timeAgo(timestamp) {
      const seconds = Math.floor(Date.now() / 1000) - timestamp;
      if (seconds < 3600) return Math.floor(seconds / 60) + " minutes ago";
      if (seconds < 86400) return Math.floor(seconds / 3600) + " hours ago";
      return Math.floor(seconds / 86400) + " days ago";
    }

    function getDomain(url) {
      if (!url) return "";
      try { return new URL(url).hostname.replace("www.", ""); } catch { return ""; }
    }

    function Header({ activeTab, onTabChange }) {
      return (
        <div style={{ backgroundColor: "#ff6600", padding: "2px 10px", display: "flex", alignItems: "center", gap: "10px" }}>
          <span style={{ fontWeight: "bold", fontSize: "16px", color: "#000", border: "1px solid #fff", padding: "0 3px" }}>Y</span>
          <b style={{ color: "#000", fontSize: "13px", marginRight: "5px" }}>Hacker News</b>
          {["top", "new", "best"].map(tab => (
            <span
              key={tab}
              onClick={() => onTabChange(tab)}
              style={{
                color: activeTab === tab ? "#fff" : "#000",
                cursor: "pointer",
                fontWeight: activeTab === tab ? "bold" : "normal",
                fontSize: "13px",
              }}
            >
              {tab}
            </span>
          ))}
          <span style={{ flex: 1 }} />
          <span style={{ color: "#000", fontSize: "13px" }}>login</span>
        </div>
      );
    }

    function StoryItem({ story, rank }) {
      const domain = getDomain(story.url);
      return (
        <div style={{ padding: "5px 0" }}>
          <div style={{ display: "flex", alignItems: "baseline", gap: "5px", paddingLeft: "10px" }}>
            <span style={{ color: "#828282", minWidth: "28px", textAlign: "right", fontSize: "13px" }}>{rank}.</span>
            <span style={{ cursor: "pointer", color: "#828282", fontSize: "10px" }}>▲</span>
            <span>
              <a href={story.url || "#"} style={{ color: "#000", textDecoration: "none", fontSize: "13px" }}>
                {story.title}
              </a>
              {domain && <span style={{ color: "#828282", fontSize: "10px", marginLeft: "5px" }}>({domain})</span>}
            </span>
          </div>
          <div style={{ paddingLeft: "52px", fontSize: "9px", color: "#828282" }}>
            {story.score} points by {story.by} {timeAgo(story.time)} | {story.descendants} comments
          </div>
        </div>
      );
    }

    function StoryList({ stories }) {
      return (
        <div style={{ backgroundColor: "#f6f6ef", padding: "10px 0" }}>
          {stories.map((story, i) => (
            <StoryItem key={story.id} story={story} rank={i + 1} />
          ))}
        </div>
      );
    }

    function Footer() {
      return (
        <div style={{ borderTop: "2px solid #ff6600", padding: "10px", textAlign: "center", color: "#828282", fontSize: "11px", marginTop: "10px" }}>
          Guidelines | FAQ | Lists | API | Security | Legal | Apply to YC | Contact
        </div>
      );
    }

    function App() {
      const [activeTab, setActiveTab] = useState("top");

      // Sort based on tab
      const sorted = [...STORIES].sort((a, b) => {
        if (activeTab === "new") return b.time - a.time;
        if (activeTab === "best") return b.score - a.score;
        return b.score - a.score; // top = default by score
      });

      return (
        <div style={{ maxWidth: "850px", margin: "0 auto", backgroundColor: "#f6f6ef" }}>
          <Header activeTab={activeTab} onTabChange={setActiveTab} />
          <StoryList stories={sorted} />
          <Footer />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
