<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>WPT-74: Per-Corner Border Radius Reference</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
  }
</style>
</head>
<body>
<div style="width: 100%; height: 100%; display: flex; flex-direction: column; padding: 10px; gap: 8px;">
  <div style="font-size: 18px;">WPT: per-corner border-radius</div>
  <div style="font-size: 10px; color: #888;">VERIFY: Individual corners round independently</div>

  <div style="font-size: 11px;">borderTopLeftRadius only</div>
  <div style="display: flex; flex-direction: row; gap: 8px;">
    <div style="width: 80px; height: 80px; background-color: #4CAF50; border-top-left-radius: 20px;"></div>
    <div style="width: 80px; height: 80px; background-color: #2196F3; border-top-right-radius: 20px;"></div>
    <div style="width: 80px; height: 80px; background-color: #FF9800; border-bottom-right-radius: 20px;"></div>
    <div style="width: 80px; height: 80px; background-color: #F44336; border-bottom-left-radius: 20px;"></div>
  </div>

  <div style="font-size: 11px;">Diagonal corners rounded</div>
  <div style="display: flex; flex-direction: row; gap: 8px;">
    <div style="width: 80px; height: 80px; background-color: #9C27B0; border-top-left-radius: 20px; border-bottom-right-radius: 20px;"></div>
    <div style="width: 80px; height: 80px; background-color: #00BCD4; border-top-right-radius: 20px; border-bottom-left-radius: 20px;"></div>
  </div>

  <div style="font-size: 11px;">Three corners rounded — one sharp</div>
  <div style="display: flex; flex-direction: row; gap: 8px;">
    <div style="width: 80px; height: 80px; background-color: #E91E63; border-top-left-radius: 16px; border-top-right-radius: 16px; border-bottom-right-radius: 16px;"></div>
    <div style="width: 80px; height: 80px; background-color: #673AB7; border-top-left-radius: 16px; border-top-right-radius: 16px; border-bottom-left-radius: 16px;"></div>
  </div>

  <div style="font-size: 11px;">Different radii per corner</div>
  <div style="width: 120px; height: 80px; display: flex; flex-direction: column; background-color: #4CAF50; border-top-left-radius: 0; border-top-right-radius: 10px; border-bottom-right-radius: 30px; border-bottom-left-radius: 50px;">
    <div style="color: #FFF; font-size: 10px;">0, 10, 30, 50</div>
  </div>

  <div style="font-size: 11px;">Pill top-half — only top corners rounded</div>
  <div style="width: 200px; height: 40px; display: flex; flex-direction: column; background-color: #2196F3; border-top-left-radius: 20px; border-top-right-radius: 20px;">
    <div style="color: #FFF; font-size: 12px;">Tab shape</div>
  </div>

  <div style="font-size: 11px;">Per-corner with border</div>
  <div style="width: 100px; height: 60px; display: flex; flex-direction: column; background-color: #333; border-width: 2px; border-style: solid; border-color: #FF9800; border-top-left-radius: 20px; border-bottom-right-radius: 20px;">
    <div style="color: #FFF; font-size: 10px;">Bordered</div>
  </div>
</div>
</body>
</html>
